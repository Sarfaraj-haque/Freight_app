name: freight_app
description: Freight Management App for truck operations.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  fl_chart: ^1.2.0
  uuid: ^4.3.3
  excel: ^4.0.6
  path_provider: ^2.1.2
  file_picker: ^12.0.0-beta.5
  cupertino_icons: ^1.0.6
  csv: ^8.0.0
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/pngs/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  adaptive_icon_foreground: "assets/pngs/app_icon.png"
  adaptive_icon_background: "#ffffff"
  image_path: "assets/pngs/app_icon.png"
  remove_alpha_ios: true